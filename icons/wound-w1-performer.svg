<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- W1: The Performer (Worth) — Two overlapping face profiles, one solid, one hollow -->

  <!-- Solid face profile (the performance) — coral -->
  <path d="M28 18 C28 18 22 22 20 28 C18 34 19 38 20 42 C21 46 24 50 28 52 C30 53 32 54 34 54 L34 18 Z" fill="#E8503A" fill-opacity="0.9"/>

  <!-- Outlined face profile (the real self) — plum, shifted right -->
  <path d="M46 26 C46 26 52 30 54 36 C56 42 55 46 54 50 C53 54 50 58 46 60 C44 61 42 62 40 62 L40 26 Z" fill="none" stroke="#5C2751" stroke-width="2"/>

  <!-- Vertical dividing line — the split/crack -->
