<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- W3: The Invisible One (Belonging) — Figure dissolving at edges -->

  <!-- Head — solid gold circle -->
  <circle cx="40" cy="22" r="8" fill="#D4A856"/>

  <!-- Body — solid at center, dissolving outward -->
  <!-- Core torso — solid -->
  <path d="M34 32 L46 32 L48 54 L32 54 Z" fill="#D4A856"/>

  <!-- Dissolving edges — fragments fading out -->
  <rect x="28" y="34" width="3" height="3" fill="#D4A856" opacity="0.6"/>
  <rect x="25" y="40" width="2.5" height="2.5" fill="#D4A856" opacity="0.35"/>
  <rect x="23" y="46" width="2" height="2" fill="#D4A856" opacity="0.15"/>
  <rect x="50" y="36" width="3" height="3" fill="#D4A856" opacity="0.6"/>
  <rect x="54" y="42" width="2.5" height="2.5" fill="#D4A856" opacity="0.35"/>
  <rect x="57" y="48" width="2" height="2" fill="#D4A856" opacity="0.15"/>

  <!-- Lower body dissolving -->
  <rect x="33" y="56" width="4" height="3" fill="#D4A856" opacity="0.5"/>
  <rect x="43" y="56" width="4" height="3" fill="#D4A856" opacity="0.5"/>
  <rect x="34" y="61" width="3" height="2.5" fill="#D4A856" opacity="0.25"/>
  <rect x="44" y="61" width="3" height="2.5" fill="#D4A856" opacity="0.25"/>
  <rect x="36" y="65" width="2" height="2" fill="#D4A856" opacity="0.1"/>
  <rect x="43" y="65" width="2" height="2" fill="#D4A856" opacity="0.1"/>

  <!-- Plum accent — subtle outline on one side only, incomplete -->
  <path d="M30 32 C28 36 27 42 28 48" fill="none" stroke="#5C2751" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
</svg>